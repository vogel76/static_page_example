<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hive Transaction Viewer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.6;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.4rem;
      color: #58a6ff;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.9rem;
    }

      input[type="text"]:focus {
        outline: none;
        border-color: #58a6ff;
      }

    button {
      padding: 8px 16px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }

      button:hover {
        background: #2ea043;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

    .error {
      background: #3d1214;
      border: 1px solid #f85149;
      color: #f85149;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 20px;
      padding: 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 0.85rem;
    }

      .meta span {
        color: #8b949e;
      }

      .meta strong {
        color: #c9d1d9;
      }

    .post-header {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #30363d;
    }

      .post-header h2 {
        font-size: 1.5rem;
        color: #e6edf3;
        margin-bottom: 4px;
      }

      .post-header .author {
        color: #58a6ff;
        font-size: 0.9rem;
      }

        .post-header .author::before {
          content: "@";
        }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .tag {
      background: #1f2937;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.75rem;
      color: #8b949e;
    }

    .post-body {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 20px 24px;
      overflow-wrap: break-word;
    }

      /* Markdown-ish rendered content */
      .post-body h1, .post-body h2, .post-body h3 {
        color: #e6edf3;
        margin: 20px 0 8px;
        padding-bottom: 4px;
        border-bottom: 1px solid #21262d;
      }

        .post-body h1:first-child, .post-body h2:first-child {
          margin-top: 0;
        }

      .post-body p {
        margin: 10px 0;
      }

      .post-body img {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
        margin: 8px 0;
      }

      .post-body a {
        color: #58a6ff;
        text-decoration: none;
      }

        .post-body a:hover {
          text-decoration: underline;
        }

      .post-body blockquote {
        border-left: 3px solid #30363d;
        padding: 4px 16px;
        margin: 10px 0;
        color: #8b949e;
      }

      .post-body code {
        background: #0d1117;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.85em;
      }

      .post-body pre {
        background: #0d1117;
        padding: 12px;
        border-radius: 6px;
        overflow-x: auto;
        margin: 10px 0;
      }

        .post-body pre code {
          padding: 0;
        }

      .post-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
      }

      .post-body th, .post-body td {
        border: 1px solid #30363d;
        padding: 6px 12px;
        text-align: left;
      }

      .post-body th {
        background: #0d1117;
      }

      .post-body hr {
        border: none;
        border-top: 1px solid #30363d;
        margin: 16px 0;
      }

      .post-body ul, .post-body ol {
        padding-left: 24px;
        margin: 8px 0;
      }

    .non-comment {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
    }

      .non-comment .op-type {
        color: #d2a8ff;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .non-comment pre {
        background: #0d1117;
        padding: 12px;
        border-radius: 6px;
        overflow-x: auto;
        font-size: 0.8rem;
        color: #8b949e;
      }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .endpoint-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

      .endpoint-row select {
        padding: 8px 12px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #c9d1d9;
        font-size: 0.9rem;
      }

    .help {
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hive Transaction Viewer</h1>

    <div class="endpoint-row">
      <select id="apiSelect">
        <option value="https://api.hive.blog/hafah-api">api.hive.blog</option>
        <option value="https://api.dev.openhive.network/hafah-api">api.dev.openhive.network</option>
      </select>
    </div>

    <div class="help">
      Enter a transaction hash or full URL. Comment operations are rendered as posts; others show raw JSON.
    </div>

    <div class="input-row">
      <input type="text" id="txInput" placeholder="Transaction hash or full URL…"
             value="0f5db617e1ccf64fd2547854b9d46e18168ef0f5">
      <button id="loadBtn" onclick="loadTx()">Load</button>
    </div>

    <div id="output"></div>
  </div>

  <!-- Markdown rendering via marked (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <!-- Sanitize HTML output -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <script>
    const txInput = document.getElementById('txInput');
    const output = document.getElementById('output');
    const loadBtn = document.getElementById('loadBtn');
    const apiSelect = document.getElementById('apiSelect');

    // Allow loading from URL hash: #tx=<hash>
    function init() {
      const params = new URLSearchParams(window.location.hash.slice(1));
      const tx = params.get('tx');
      const api = params.get('api');
      if (api) {
        for (const opt of apiSelect.options) {
          if (opt.value === api) { apiSelect.value = api; break; }
        }
      }
      if (tx) {
        txInput.value = tx;
        loadTx();
      }
    }

    function extractHash(input) {
      input = input.trim();
      // Full URL: extract hash from path
      const urlMatch = input.match(/transactions\/([0-9a-f]{40})/i);
      if (urlMatch) {
        // Also try to extract API base from the URL
        const apiMatch = input.match(/^(https?:\/\/[^/]+\/hafah-api)/);
        if (apiMatch) {
          const base = apiMatch[1];
          for (const opt of apiSelect.options) {
            if (opt.value === base) { apiSelect.value = base; break; }
          }
        }
        return urlMatch[1];
      }
      // Raw hash
      if (/^[0-9a-f]{40}$/i.test(input)) return input;
      return null;
    }

    async function loadTx() {
      const hash = extractHash(txInput.value);
      if (!hash) {
        output.innerHTML = '<div class="error">Invalid input. Provide a 40-char hex transaction hash or a full hafah-api URL.</div>';
        return;
      }

      // Update URL hash for shareability
      const base = apiSelect.value;
      window.location.hash = `tx=${hash}&api=${encodeURIComponent(base)}`;

      loadBtn.disabled = true;
      output.innerHTML = '<span class="spinner"></span> Loading…';

      try {
        const url = `${base}/transactions/${hash}?include-virtual=false`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const data = await res.json();
        render(data);
      } catch (e) {
        output.innerHTML = `<div class="error">${escapeHtml(e.message)}</div>`;
      } finally {
        loadBtn.disabled = false;
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function render(data) {
      const tx = data.transaction_json;
      if (!tx) {
        output.innerHTML = '<div class="error">Unexpected response format.</div>';
        return;
      }

      let html = '';

      // Transaction metadata
      html += `<div class="meta">
        <div><span>Block</span><br><strong>${data.block_num}</strong></div>
        <div><span>Tx #</span><br><strong>${data.transaction_num}</strong></div>
        <div><span>Time</span><br><strong>${data.timestamp}</strong></div>
        <div><span>Hash</span><br><strong title="${data.transaction_id}">${data.transaction_id.slice(0, 12)}…</strong></div>
      </div>`;

      for (const op of tx.operations) {
        if (op.type === 'comment_operation') {
          html += renderComment(op.value);
        } else {
          html += renderGenericOp(op);
        }
      }

      output.innerHTML = html;
    }

    function renderComment(v) {
      let tags = [];
      try {
        const meta = JSON.parse(v.json_metadata);
        if (Array.isArray(meta.tags)) tags = meta.tags;
      } catch {}

      const isReply = !!v.parent_author;
      const label = isReply
        ? `Reply to @${escapeHtml(v.parent_author)}/${escapeHtml(v.parent_permlink)}`
        : '';

      // Render markdown body
      const rendered = DOMPurify.sanitize(marked.parse(v.body || ''), {
        ADD_TAGS: ['center'],
      });

      let html = '<div class="post-header">';
      if (v.title) html += `<h2>${escapeHtml(v.title)}</h2>`;
      html += `<div class="author">${escapeHtml(v.author)}</div>`;
      if (label) html += `<div style="color:#8b949e;font-size:0.85rem;margin-top:2px">${label}</div>`;
      if (tags.length) {
        html += '<div class="tags">';
        for (const t of tags) html += `<span class="tag">${escapeHtml(t)}</span>`;
        html += '</div>';
      }
      html += '</div>';
      html += `<div class="post-body">${rendered}</div>`;
      return html;
    }

    function renderGenericOp(op) {
      const json = JSON.stringify(op.value, null, 2);
      return `<div class="non-comment">
        <div class="op-type">${escapeHtml(op.type)}</div>
        <pre><code>${escapeHtml(json)}</code></pre>
      </div>`;
    }

    // Enter key triggers load
    txInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadTx(); });

    init();
  </script>
</body>
</html>
